get_schedule:
  name: Get Power Reducer Schedule
  description: >
    Read the Power Reducer weekly schedule for a specific day.
    Returns 48 half-hour slots (00:00–23:30) with their mode (off/auto/boost).
  fields:
    config_entry_id:
      name: Config Entry
      description: The Elios4You integration instance.
      required: true
      selector:
        config_entry:
          integration: 4noks_elios4you
    day:
      name: Day of week
      description: "Day of week to read (0=Sunday, 1=Monday … 6=Saturday)."
      required: true
      example: 0
      selector:
        number:
          min: 0
          max: 6
          mode: box
          step: 1

set_schedule:
  name: Set Power Reducer Schedule
  description: >
    Write the full Power Reducer schedule for a specific day.
    Provide exactly 48 slot values (off/auto/boost), one per 30-minute period
    starting at 00:00.
  fields:
    config_entry_id:
      name: Config Entry
      description: The Elios4You integration instance.
      required: true
      selector:
        config_entry:
          integration: 4noks_elios4you
    day:
      name: Day of week
      description: "Day of week to write (0=Sunday, 1=Monday … 6=Saturday)."
      required: true
      example: 0
      selector:
        number:
          min: 0
          max: 6
          mode: box
          step: 1
    slots:
      name: Slots
      description: >
        List of exactly 48 mode strings for 30-minute periods starting at 00:00.
        Each element must be one of: off, auto, boost.
      required: true
      example: '["auto","auto","boost","boost","boost","boost","auto","auto"]'
      selector:
        object:

set_schedule_range:
  name: Set Schedule Range
  description: >
    Set a contiguous time range in the Power Reducer schedule to a specific mode.
    Reads the current schedule, patches the specified range, and writes it back.
    Both start_time and end_time must be on 30-minute boundaries (HH:00 or HH:30).
  fields:
    config_entry_id:
      name: Config Entry
      description: The Elios4You integration instance.
      required: true
      selector:
        config_entry:
          integration: 4noks_elios4you
    day:
      name: Day of week
      description: "Day of week to modify (0=Sunday, 1=Monday … 6=Saturday)."
      required: true
      example: 0
      selector:
        number:
          min: 0
          max: 6
          mode: box
          step: 1
    start_time:
      name: Start time
      description: "Start of the time range (HH:MM on a 30-min boundary, e.g. 06:00)."
      required: true
      example: "06:00"
      selector:
        time:
    end_time:
      name: End time
      description: "End of the time range (HH:MM on a 30-min boundary, e.g. 08:30)."
      required: true
      example: "08:30"
      selector:
        time:
    mode:
      name: Mode
      description: Mode to apply to the specified range (off, auto, or boost).
      required: true
      selector:
        select:
          options:
            - off
            - auto
            - boost
